<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddie AI • Smart Voice Assistant</title>
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <!-- Use Google Fonts (Inter) for a clean modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
</head>
<body>
    
    <div class="main-layout">
        <header>
            <div class="logo-area">
                <div class="status-dot online"></div>
                <h1>Buddie AI</h1>
            </div>
        </header>

        <!-- The main container for chat bubbles -->
        <div class="chat-viewport" id="chatViewport">
            <div class="chat-log" id="chatLog">
                <!-- Welcome Message (Optional) -->
                <div class="chat-message ai">
                    <div class="message-bubble">
                        Hello! I'm Buddie: your speaking assistant.
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div class="controls" style="display: flex; gap: 20px;">
                <button id="recordBtn" class="btn-mic">
                    <!-- Mic Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                
                <button id="stopBtn" class="btn-stop" disabled>
                    <!-- Stop Square Icon -->
                    <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="6" width="12" height="12"></rect>
                    </svg>
                </button>
            </div>
        </footer>
    </div>
    <audio id="audioPlayer" style="display: none;"></audio>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
